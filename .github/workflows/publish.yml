name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # Permissions for OIDC (Trusted Publishing)
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build

    - name: Build binary wheel and source tarball
      run: python -m build

    - name: Publish to PyPI
      # This action uses OIDC by default if no API token is provided.
      # To use a token, set up a secret named PYPI_API_TOKEN and uncomment the password line below.
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # password: ${{ secrets.PYPI_API_TOKEN }}
        # If using OIDC (Recommended):
        # 1. Go to PyPI -> Account Settings -> Add a new Trusted Publisher.
        # 2. Select 'GitHub'.
        # 3. Enter 'async-media-agents' (Owner), 'async-media-agents' (Repo).
        # 4. Workflow name: 'publish.yml'.
        print-hash: true
